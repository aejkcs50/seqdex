syntax = "proto3";

// Package seqdex.v1 hosts the SeqDEX cross-chain (BTC<->Sequentia-asset) swap API
// (Phase 5, milestone 2). It is intentionally a NEW, stateful, multi-step
// service distinct from the same-chain TradeService (which is a single atomic
// PSET and does not fit cross-chain). The daemon is the cross-chain
// MAKER/counterparty: it holds reserves of the parent-chain "BTC" asset and of
// the anchored Sequentia-chain asset, and drives a Design-A single-secret HTLC swap built
// on the proven pkg/xchain mechanism.
//
// MVP direction (one direction only): the taker BUYS a Sequentia-chain asset, paying BTC.
// This places the taker on the Sequentia-receiving side (anchor-shortened ~1-conf
// benefit) and makes the taker the INITIATOR who locks the BTC leg first
// (satisfying the BTC-leg-first ordering rule).
package seqdex.v1;

import "google/api/annotations.proto";

// XchainService is the daemon-side cross-chain swap maker. A taker drives a
// full BTC->Sequentia-asset swap over these RPCs:
//
//   1. ListXchainMarkets / GetXchainQuote  -> discover pairs + reserves, get a
//      quote (amounts, price, fee, the maker's claim/refund pubkeys, timeouts
//      T_btc > T_seq).
//   2. (taker) generate secret s, H=sha256(s); lock the BTC leg (claim=maker
//      with s, refund=taker after T_btc); confirm it on the parent chain.
//   3. ProposeXchainSwap(H, btcLeg, taker pubkeys) -> the daemon VERIFIES the
//      BTC leg then locks the Sequentia leg (claim=taker with s, refund=maker after
//      T_seq) in a Sequentia block, replying XchainSwapAccepted{seqLeg...}.
//   4. (taker) VerifySeqLegSafe (anchorheight >= btc height && anchor ok), then
//      claim the Sequentia leg with s, revealing s on the Sequentia chain.
//   5. The daemon watches the Sequentia chain for the taker's claim, extracts s, and
//      claims the BTC leg with s. GetXchainSwap lets the taker poll state.
service XchainService {
  // ListXchainMarkets returns the BTC/Sequentia-asset pairs the maker will swap and
  // its current reserves on each leg.
  rpc ListXchainMarkets(ListXchainMarketsRequest) returns (ListXchainMarketsResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/markets"
      body: "*"
    };
  }

  // GetXchainQuote returns a firm-ish quote for buying `seq_amount` units of the
  // market's Sequentia-chain asset with BTC, including the maker's pubkeys and the two
  // CLTV timeouts. The quote is held in memory for a short window.
  rpc GetXchainQuote(GetXchainQuoteRequest) returns (GetXchainQuoteResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/quote"
      body: "*"
    };
  }

  // ProposeXchainSwap is called by the taker AFTER it has locked + confirmed the
  // BTC leg. The daemon verifies the BTC leg against the quote (script, H,
  // amount, recipient, confirmed), then locks the Sequentia leg and returns it, or a
  // failure.
  rpc ProposeXchainSwap(ProposeXchainSwapRequest) returns (ProposeXchainSwapResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/propose"
      body: "*"
    };
  }

  // GetXchainSwap reports the current swap state so the taker can poll for the
  // maker's BTC-leg claim (and for the preimage the daemon extracted). It serves
  // BOTH directions; in the reverse direction the `preimage` field is how the
  // taker reads the secret (revealed by the maker's asset-leg claim) to claim BTC.
  rpc GetXchainSwap(GetXchainSwapRequest) returns (GetXchainSwapResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/swap"
      body: "*"
    };
  }

  // --- REVERSE direction (asset->BTC): the taker SELLS a Sequentia asset for BTC.
  // Roles flip vs the forward flow: the MAKER is the secret holder. It funds the
  // BTC leg FIRST (claim=taker, refund=maker, T_btc, the LONGER timeout), the
  // taker funds the Sequentia asset leg SECOND (claim=maker, refund=taker, T_seq,
  // anchored), the maker claims the asset leg (revealing the secret and receiving
  // the asset), and the taker reads the secret off-chain (GetXchainSwap.preimage)
  // to claim the maker's BTC leg. The two invariants are UNCHANGED: T_btc > T_seq,
  // and the Sequentia leg is the second/anchored leg gated by VerifySeqLegSafe.

  // GetReverseXchainQuote quotes SELLING `seq_amount` of the market's asset FOR
  // BTC: returns the BTC the taker will receive (net of fee) and the two CLTV
  // timeouts. No leg is locked yet; it reserves BTC for the quote window.
  rpc GetReverseXchainQuote(GetReverseXchainQuoteRequest) returns (GetReverseXchainQuoteResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/reverse/quote"
      body: "*"
    };
  }

  // OpenReverseXchainSwap commits the maker: it generates the secret, LOCKS the
  // BTC leg (claim=taker, refund=maker, T_btc), and returns the funded BTC leg +
  // H + the maker's Sequentia-leg claim pubkey, so the taker can fund the asset
  // leg. The taker supplies its BTC-leg claim pubkey and Sequentia-leg refund
  // pubkey up front.
  rpc OpenReverseXchainSwap(OpenReverseXchainSwapRequest) returns (OpenReverseXchainSwapResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/reverse/open"
      body: "*"
    };
  }

  // SubmitReverseSeqLeg is called by the taker AFTER it funded + confirmed the
  // Sequentia asset leg. The maker verifies it against the swap (script, H,
  // amount/asset, confirmations) and admits it; the maker's watcher then runs the
  // anchor gate and claims the asset leg, revealing the secret (read it via
  // GetXchainSwap.preimage to claim the BTC leg).
  rpc SubmitReverseSeqLeg(SubmitReverseSeqLegRequest) returns (SubmitReverseSeqLegResponse) {
    option (google.api.http) = {
      post: "/v1/xchain/reverse/submit"
      body: "*"
    };
  }
}

// XchainSwapState is the maker state machine. Lifecycle (happy path):
//   QUOTED -> PENDING_BTC_LOCK -> SEQ_LOCKED -> SEQ_CLAIMED -> BTC_CLAIMED.
// REFUNDED / FAILED are terminal off-ramps.
enum XchainSwapState {
  XCHAIN_SWAP_STATE_UNSPECIFIED = 0;
  // A quote was issued; the daemon is waiting for the taker to lock the BTC leg
  // and call ProposeXchainSwap.
  XCHAIN_SWAP_STATE_PENDING_BTC_LOCK = 1;
  // The daemon verified the BTC leg and locked the Sequentia leg (anchored). Waiting
  // for the taker to claim the Sequentia leg (revealing the preimage).
  XCHAIN_SWAP_STATE_SEQ_LOCKED = 2;
  // The taker claimed the Sequentia leg; the daemon has read the preimage off-chain.
  XCHAIN_SWAP_STATE_SEQ_CLAIMED = 3;
  // The daemon claimed the BTC leg with the preimage. Swap complete.
  XCHAIN_SWAP_STATE_BTC_CLAIMED = 4;
  // The maker refunded its leg after the timeout because the taker stalled
  // (forward: its Sequentia leg after T_seq; reverse: its BTC leg after T_btc).
  XCHAIN_SWAP_STATE_REFUNDED = 5;
  // The swap failed (bad leg, RPC error, etc.). Terminal.
  XCHAIN_SWAP_STATE_FAILED = 6;
  // REVERSE: the maker locked the BTC leg (OpenReverseXchainSwap) and is waiting
  // for the taker to fund the Sequentia asset leg and call SubmitReverseSeqLeg.
  XCHAIN_SWAP_STATE_BTC_LOCKED = 7;
  // REVERSE: the taker submitted its Sequentia asset leg and the maker verified
  // it; the watcher will run the anchor gate then claim it (revealing the secret).
  XCHAIN_SWAP_STATE_SEQ_SUBMITTED = 8;
}

// XchainMarket identifies a swappable BTC/Sequentia-asset pair.
message XchainMarket {
  // The parent-chain "BTC" (pegged bitcoin) asset id, hex.
  string btc_asset = 1;
  // The anchored Sequentia asset id, hex.
  string seq_asset = 2;
  // Human label, e.g. "BTC/USDX".
  string name = 3;
  // The maker's available Sequentia-asset reserve (atoms) to sell.
  uint64 seq_reserve = 4;
  // The maker's available BTC reserve (atoms) to receive into.
  uint64 btc_reserve = 5;
  // Price: how many Sequentia-asset atoms per 1 BTC atom (the maker's ask).
  double price_seq_per_btc = 6;
}

message ListXchainMarketsRequest {}

message ListXchainMarketsResponse {
  repeated XchainMarket markets = 1;
}

message GetXchainQuoteRequest {
  // The Sequentia-chain asset id (hex) identifying the market.
  string seq_asset = 1;
  // How many units (atoms) of the Sequentia-chain asset the taker wants to BUY.
  uint64 seq_amount = 2;
}

message GetXchainQuoteResponse {
  // Opaque quote id; pass to ProposeXchainSwap.
  string quote_id = 1;
  // Sequentia-asset atoms the taker will receive.
  uint64 seq_amount = 2;
  // BTC atoms the taker must lock on the parent chain.
  uint64 btc_amount = 3;
  // Effective price (Sequentia-asset atoms per BTC atom) used for this quote.
  double price_seq_per_btc = 4;
  // Maker fee already folded into btc_amount (BTC atoms), for transparency.
  uint64 fee_btc = 5;
  // The maker's claim pubkey for the BTC leg (33-byte compressed, hex): the
  // taker locks the BTC leg claimable by THIS key with the preimage.
  string maker_btc_claim_pub = 6;
  // The maker's refund pubkey for the Sequentia leg (hex): the maker refunds its own
  // Sequentia leg with this key after T_seq.
  string maker_seq_refund_pub = 7;
  // T_btc: the parent-chain CLTV height at/after which the TAKER may refund its
  // BTC leg. This is the LONGER timeout (taker refunds last).
  uint32 btc_locktime = 8;
  // T_seq: the Sequentia CLTV height at/after which the MAKER may refund its Sequentia
  // leg. This is the SHORTER timeout (T_btc > T_seq).
  uint32 seq_locktime = 9;
  // Unix seconds after which this quote is no longer accepted.
  int64 expires_at_unix = 10;
}

// XchainBtcLeg describes the taker's confirmed BTC-leg HTLC so the daemon can
// verify it. The redeemScript is provided so the daemon can recompute the P2SH
// and confirm the embedded hash/pubkeys/locktime match the quote.
message XchainBtcLeg {
  string txid = 1;
  uint32 vout = 2;
  // Parent-chain height at which the BTC leg confirmed (Hp).
  int64 height = 3;
  // The funded HTLC redeemScript, hex (OP_IF SHA256 H ... claim/refund ...).
  string redeem_script = 4;
  // Funded value in BTC atoms.
  uint64 amount = 5;
  // Parent-chain asset id of the funded output, hex.
  string asset_id = 6;
}

message ProposeXchainSwapRequest {
  // The quote being accepted.
  string quote_id = 1;
  // H = sha256(secret), hex. Must match the H embedded in the BTC-leg script.
  string hash = 2;
  // The taker's confirmed BTC leg.
  XchainBtcLeg btc_leg = 3;
  // The taker's claim pubkey for the Sequentia leg (hex): the daemon locks the Sequentia leg
  // claimable by THIS key with the preimage.
  string taker_seq_claim_pub = 4;
  // The taker's refund pubkey on the BTC leg (hex), for the maker to recompute
  // and verify the BTC-leg redeemScript.
  string taker_btc_refund_pub = 5;
}

// XchainSeqLeg describes the Sequentia-leg HTLC the daemon locked for the taker.
message XchainSeqLeg {
  string txid = 1;
  uint32 vout = 2;
  // The Sequentia block that confirmed the Sequentia leg.
  string block_hash = 3;
  // The anchorheight committed in that block's header (>= btc_leg.height).
  int64 anchor_height = 4;
  // The Sequentia-leg HTLC redeemScript, hex.
  string redeem_script = 5;
  // Funded Sequentia-asset value in atoms.
  uint64 amount = 6;
  // Sequentia-chain asset id, hex.
  string asset_id = 7;
}

message ProposeXchainSwapResponse {
  oneof result {
    XchainSwapAccepted accepted = 1;
    XchainSwapFail fail = 2;
  }
}

message XchainSwapAccepted {
  string swap_id = 1;
  XchainSeqLeg seq_leg = 2;
}

message XchainSwapFail {
  // Machine-readable reason (e.g. "BTC_LEG_UNCONFIRMED", "HASH_MISMATCH").
  string code = 1;
  string message = 2;
}

message GetXchainSwapRequest {
  string swap_id = 1;
}

message GetXchainSwapResponse {
  string swap_id = 1;
  XchainSwapState state = 2;
  XchainSeqLeg seq_leg = 3;
  // The taker's Sequentia-leg claim txid, once observed (preimage revealed here).
  string seq_claim_txid = 4;
  // The maker's BTC-leg claim txid, once the maker has claimed.
  string btc_claim_txid = 5;
  // The preimage the maker extracted from the taker's Sequentia claim, hex (empty
  // until SEQ_CLAIMED). Returned for proof/inspection on regtest.
  string preimage = 6;
  // Populated when state == FAILED or REFUNDED.
  string detail = 7;
  // The confirmed parent-chain height of the BTC leg (0 until it confirms). In a
  // REVERSE (asset->BTC) swap the maker funds the BTC leg and broadcasts it at 0
  // conf on a live network; the taker polls this field and only funds the SEQ leg
  // once it is > 0, so the SEQ block can anchor at/above this height. In a forward
  // swap it is the verified height of the taker's BTC leg.
  int64 btc_leg_height = 8;
}

// ----- REVERSE direction (asset->BTC) messages -----

message GetReverseXchainQuoteRequest {
  // The Sequentia-chain asset id (hex) identifying the market.
  string seq_asset = 1;
  // How many atoms of the Sequentia asset the taker wants to SELL.
  uint64 seq_amount = 2;
}

message GetReverseXchainQuoteResponse {
  // Opaque quote id; pass to OpenReverseXchainSwap.
  string quote_id = 1;
  // Sequentia-asset atoms the taker will sell.
  uint64 seq_amount = 2;
  // BTC atoms the taker will RECEIVE (net of the maker fee).
  uint64 btc_amount = 3;
  // Effective price (Sequentia-asset atoms per BTC atom) used for this quote.
  double price_seq_per_btc = 4;
  // Maker fee deducted from btc_amount (BTC atoms), for transparency.
  uint64 fee_btc = 5;
  // T_btc: the parent-chain CLTV height at/after which the MAKER may refund its
  // funded BTC leg. This is the LONGER timeout (T_btc > T_seq).
  uint32 btc_locktime = 6;
  // T_seq: the Sequentia CLTV height at/after which the TAKER may refund its
  // funded asset leg. This is the SHORTER timeout.
  uint32 seq_locktime = 7;
  // Unix seconds after which this quote is no longer accepted.
  int64 expires_at_unix = 8;
}

message OpenReverseXchainSwapRequest {
  // The quote being accepted.
  string quote_id = 1;
  // The taker's claim pubkey for the BTC leg (33-byte compressed, hex): the maker
  // locks the BTC leg claimable by THIS key with the preimage.
  string taker_btc_claim_pub = 2;
  // The taker's refund pubkey for the Sequentia leg (hex), so the maker can
  // recompute + verify the asset-leg redeemScript the taker will fund.
  string taker_seq_refund_pub = 3;
}

message OpenReverseXchainSwapResponse {
  oneof result {
    ReverseXchainSwapOpened opened = 1;
    XchainSwapFail fail = 2;
  }
}

message ReverseXchainSwapOpened {
  string swap_id = 1;
  // The maker's funded BTC leg (the taker claims it with the preimage).
  XchainBtcLeg btc_leg = 2;
  // H = sha256(secret), hex. The maker generated the secret; only H is published.
  string hash = 3;
  // The maker's claim pubkey for the Sequentia leg (hex): the taker funds the
  // asset leg claimable by THIS key; the maker reveals the secret by claiming it.
  string maker_seq_claim_pub = 4;
  // The maker's refund pubkey on the BTC leg (hex), for the taker to recompute +
  // verify the maker's BTC-leg redeemScript before funding the asset leg.
  string maker_btc_refund_pub = 5;
  // T_btc (LONGER) and T_seq (SHORTER) CLTV heights.
  uint32 btc_locktime = 6;
  uint32 seq_locktime = 7;
}

message SubmitReverseSeqLegRequest {
  string swap_id = 1;
  // The taker's confirmed Sequentia asset leg: it funded the HTLC claimable by
  // the maker's seq-claim pubkey and refundable by the taker after T_seq.
  XchainSeqLeg seq_leg = 2;
}

message SubmitReverseSeqLegResponse {
  oneof result {
    XchainSwapAccepted accepted = 1;
    XchainSwapFail fail = 2;
  }
}
